spring:
  application:
    name: security-spring
  datasource:
    url: jdbc:h2:mem:securitydb
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: "c2VjdXJpdHktc3ByaW5nLXRyYWluaW5nLWxhYi1zdXBlci1zZWNyZXQta2V5LWZvci1qd3QtaG1hYy1zaGEyNTYtYWxnb3JpdGhtLTIwMjQ="
    access-token-expiry-ms: 900000       # 15 minutes
    refresh-token-expiry-ms: 604800000   # 7 days
  cookie:
    secure: false
    same-site: Strict
  rate-limit:
    login-capacity: 10
    login-refill-tokens: 10
    login-refill-seconds: 60
    refresh-capacity: 20
    refresh-refill-tokens: 20
    refresh-refill-seconds: 60

server:
  port: 8080
